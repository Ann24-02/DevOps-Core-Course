apiVersion: v1
kind: Service
metadata:
  name: python-app-service
  namespace: default
  labels:
    app: python-app
    service-type: nodeport
spec:
  type: NodePort
  selector:
    app: python-app
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
    nodePort: 30080
  sessionAffinity: None
