name: Ansible Deployment

on:
  push:
    branches: [ lab03, lab6, main, master ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible ansible-lint
      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml || echo "Lint completed with warnings"

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Ansible and Python Docker module
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip
          pip3 install docker
          ansible-galaxy collection install community.docker
          echo "✅ Docker version: $(docker --version)"
          echo "✅ Ansible version: $(ansible --version | head -1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with Ansible
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          cd ansible
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook -i inventory playbooks/deploy.yml \
            --vault-password-file /tmp/vault_pass \
            --extra-vars "dockerhub_username=$DOCKER_USERNAME dockerhub_password=$DOCKER_PASSWORD app_name=devops-app"
          rm /tmp/vault_pass

      - name: Verify deployment
        run: |
          sleep 10
          curl -f http://${{ secrets.VM_HOST }}:8080/health || exit 1
          echo "✅ Application is healthy!"
