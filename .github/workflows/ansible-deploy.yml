name: Ansible Deployment

on:
  push:
    branches: [ lab03, lab6, main, master ]  
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  workflow_dispatch: 

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible ansible-lint
          ansible --version
          ansible-lint --version

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml || echo "Lint completed with warnings"

  deploy:
    name: Deploy Application with Ansible
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/lab03' || github.ref == 'refs/heads/lab6')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible and dependencies
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip
          pip3 install docker
          pip3 install 'docker-compose==1.29.2' || echo "docker-compose installed with warnings"
          ansible-galaxy collection install community.docker

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          
      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -v ubuntu@${{ secrets.VM_HOST }} "echo 'SSH connection successful'"

      - name: Deploy with Ansible
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          cd ansible
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook -i inventory playbooks/deploy.yml \
            --vault-password-file /tmp/vault_pass \
            -e "web_app_wipe=false"
          rm /tmp/vault_pass

      - name: Verify deployment
        run: |
          sleep 10
          echo "Checking application health..."
          curl -f http://${{ secrets.VM_HOST }}:8080/health || exit 1
          echo "✅ Application is healthy!"