name: Python CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app_python/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app_python/**'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./app_python
      run: |
        pip install -r requirements.txt
    
    - name: Lint with flake8
      working-directory: ./app_python
      run: |
        flake8 . --count --max-complexity=10 --statistics
    
    - name: Run tests with pytest
      working-directory: ./app_python
      run: |
        pytest --cov=app --cov-report=xml
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app_python/test-results.xml

  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./app_python
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/devops-info-service:latest
          ${{ secrets.DOCKER_USERNAME }}/devops-info-service:${{ github.sha }}
    
    - name: Verify Docker push
      run: |
        echo "✅ Docker image pushed successfully!"
        echo "📦 Image: ${{ secrets.DOCKER_USERNAME }}/devops-info-service"
        echo "🏷️ Tags: latest, ${{ github.sha }}"