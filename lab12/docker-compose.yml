version: '3.8'

services:
  app:
    build: .
    ports:
      - "5001:5000"
    volumes:
      # Volume для персистентных данных (счетчик посещений)
      - visits-data:/data
      # Опционально: монтирование исходного кода для разработки
      - ./app.py:/app/app.py
    environment:
      - DATA_DIR=/data
      - FLASK_ENV=development
    configs:
      - source: app_config
        target: /config/config.json

volumes:
  visits-data:
    name: my-app-visits-data

configs:
  app_config:
    content: |
      {
        "app_name": "visits-counter-app",
        "environment": "development",
        "version": "1.0.0",
        "features": {
          "analytics": true,
          "logging": true,
          "cache_enabled": false
        },
        "rate_limit": 100
      }