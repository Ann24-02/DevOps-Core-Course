---
monitoring_base_dir: /opt/monitoring

monitoring_loki_version: "3.0.0"
monitoring_promtail_version: "3.0.0"
monitoring_grafana_version: "12.3.1"

monitoring_loki_port: 3100
monitoring_grafana_port: 3000
monitoring_promtail_port: 9080

monitoring_retention_period: "168h"

monitoring_loki_cpu_limit: "1.0"
monitoring_loki_mem_limit: "1G"
monitoring_loki_cpu_reservation: "0.5"
monitoring_loki_mem_reservation: "512M"

monitoring_grafana_cpu_limit: "1.0"
monitoring_grafana_mem_limit: "1G"
monitoring_grafana_cpu_reservation: "0.5"
monitoring_grafana_mem_reservation: "512M"

monitoring_promtail_cpu_limit: "0.5"
monitoring_promtail_mem_limit: "512M"
monitoring_promtail_cpu_reservation: "0.25"
monitoring_promtail_mem_reservation: "256M"

monitoring_grafana_admin_password: "admin"

